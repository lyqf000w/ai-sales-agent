name: ai-sales-agent-postgres

services:
  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME:-ai-sales-postgres}
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_sales}
      POSTGRES_USER: ${POSTGRES_USER:-ai_sales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_sales123}
      TZ: Asia/Shanghai
    volumes:
      - ai_sales_postgres:/var/lib/postgresql/data
      - ../../sql/postgresql/ruoyi-vue-pro.sql:/docker-entrypoint-initdb.d/01-ruoyi-vue-pro.sql:ro
      - ../../sql/postgresql/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql:ro
      - ../../sql/postgresql/agent.sql:/docker-entrypoint-initdb.d/03-agent.sql:ro
      - ../../sql/postgresql/agent-gewe-identity-v2.sql:/docker-entrypoint-initdb.d/04-agent-gewe-identity-v2.sql:ro
      - ../../sql/postgresql/agent-gewe-provider-callback-url.sql:/docker-entrypoint-initdb.d/05-agent-gewe-provider-callback-url.sql:ro
      - ../../sql/postgresql/agent-default-quiet-seconds-90.sql:/docker-entrypoint-initdb.d/06-agent-default-quiet-seconds-90.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_sales} -d ${POSTGRES_DB:-ai_sales}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    container_name: ${REDIS_CONTAINER_NAME:-ai-sales-redis}
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - ai_sales_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    container_name: ${SERVER_CONTAINER_NAME:-ai-sales-server}
    build:
      context: ../../sales-server
    image: ai-sales-server:postgres
    restart: unless-stopped
    ports:
      - "${SERVER_HOST_PORT:-48080}:48080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.egd=file:/dev/./urandom}
      PERSONAL_SALES_BACKEND_ENABLED: ${PERSONAL_SALES_BACKEND_ENABLED:-false}
      PERSONAL_SALES_ASSISTANT_SKILL_KEY: ${PERSONAL_SALES_ASSISTANT_SKILL_KEY:-}
      PERSONAL_SALES_ASSISTANT_SKILL_DEFAULT_TENANT_ID: ${PERSONAL_SALES_ASSISTANT_SKILL_DEFAULT_TENANT_ID:-1}
      AGENT_LLM_DEEPSEEK_ENABLED: ${AGENT_LLM_DEEPSEEK_ENABLED:-true}
      AGENT_LLM_DEEPSEEK_URL: ${AGENT_LLM_DEEPSEEK_URL:-https://api.deepseek.com/chat/completions}
      AGENT_LLM_DEEPSEEK_MODEL: ${AGENT_LLM_DEEPSEEK_MODEL:-deepseek-chat}
      AGENT_LLM_DEEPSEEK_API_KEY: ${AGENT_LLM_DEEPSEEK_API_KEY:-}
      ARGS: >-
        --spring.datasource.dynamic.datasource.master.url=${MASTER_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ai_sales}
        --spring.datasource.dynamic.datasource.master.username=${MASTER_DATASOURCE_USERNAME:-ai_sales}
        --spring.datasource.dynamic.datasource.master.password=${MASTER_DATASOURCE_PASSWORD:-ai_sales123}
        --spring.datasource.dynamic.datasource.slave.url=${SLAVE_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ai_sales}
        --spring.datasource.dynamic.datasource.slave.username=${SLAVE_DATASOURCE_USERNAME:-ai_sales}
        --spring.datasource.dynamic.datasource.slave.password=${SLAVE_DATASOURCE_PASSWORD:-ai_sales123}
        --spring.data.redis.host=${REDIS_HOST:-redis}
        --spring.data.redis.port=${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ai_sales_postgres:
    driver: local
  ai_sales_redis:
    driver: local
